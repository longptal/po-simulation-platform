version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: po-sim-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: posim
      POSTGRES_PASSWORD: posim_dev_password
      POSTGRES_DB: posim_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U posim']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: po-sim-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: apps/orchestrator/Dockerfile
    container_name: po-sim-orchestrator
    restart: unless-stopped
    ports:
      - '3100:3100'
    environment:
      DATABASE_URL: postgresql://posim:posim_dev_password@postgres:5432/posim_db
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MOCK_LLM: ${ANTHROPIC_API_KEY:+false}${ANTHROPIC_API_KEY:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
