<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PO Simulation Platform — Onboarding Mockup (Step 1/2: Welcome)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } } } }
    }
  </script>
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-lg">
    <!-- Progress -->
    <div class="flex items-center gap-2 mb-8">
      <div class="h-1.5 flex-1 bg-brand-600 rounded-full"></div>
      <div class="h-1.5 flex-1 bg-zinc-200 rounded-full"></div>
      <div class="h-1.5 flex-1 bg-zinc-200 rounded-full"></div>
      <span class="text-xs text-zinc-400 tabular-nums ml-2">1 / 4</span>
    </div>

    <!-- Content -->
    <div class="bg-white border border-zinc-200 rounded-xl p-8 shadow-sm">
      <div class="flex items-center justify-center mb-6">
        <div class="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center">
          <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-zinc-900 text-center">Welcome to PO Simulator</h1>
      <p class="text-base text-zinc-600 text-center mt-3 px-4">You'll be the Product Owner of a real team — with BA, Designer, Dev, and Stakeholder agents that all respond to your decisions.</p>
      <p class="text-base text-zinc-600 text-center mt-2 px-4">Every decision has trade-offs. There's no single right answer — only better choices based on context.</p>

      <div class="mt-8">
        <p class="text-sm font-medium text-zinc-700 text-center mb-2">What's your PO experience level?</p>
        <div class="space-y-3">
          <button class="w-full text-left px-4 py-3 border border-zinc-200 rounded-lg hover:border-brand-300 hover:bg-brand-50 transition group focus:outline-none focus:ring-2 focus:ring-brand-500">
            <span class="text-sm font-medium text-zinc-900">Completely new</span>
            <p class="text-xs text-zinc-500 mt-0.5">Never been a PO — teach me everything</p>
          </button>
          <button class="w-full text-left px-4 py-3 border border-brand-300 bg-brand-50 rounded-lg ring-1 ring-brand-500 transition group focus:outline-none focus:ring-2 focus:ring-brand-500">
            <span class="text-sm font-medium text-zinc-900">Some experience (less than 1 year)</span>
            <p class="text-xs text-zinc-500 mt-0.5">I've done some PO work, want to level up</p>
          </button>
          <button class="w-full text-left px-4 py-3 border border-zinc-200 rounded-lg hover:border-brand-300 hover:bg-brand-50 transition group focus:outline-none focus:ring-2 focus:ring-brand-500">
            <span class="text-sm font-medium text-zinc-900">Experienced (1–3 years)</span>
            <p class="text-xs text-zinc-500 mt-0.5">I know the basics — challenge me</p>
          </button>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <div class="flex items-center justify-between mt-6">
      <button class="px-4 py-2 text-sm text-zinc-500 hover:text-zinc-700 font-medium">Skip onboarding</button>
      <button class="px-6 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-md hover:bg-brand-700 focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">Continue</button>
    </div>
  </div>

</body>
</html>
